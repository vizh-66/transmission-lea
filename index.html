<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Transmission For Lea</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

background:linear-gradient(180deg,#02030b,#08152e,#000);

height:100vh;

overflow:hidden;

display:flex;

justify-content:center;

align-items:center;

color:white;

}

.stars{

position:absolute;

width:100%;

height:100%;

overflow:hidden;

}

.star{

position:absolute;

width:2px;

height:2px;

background:white;

border-radius:50%;

animation:twinkle 3s infinite;

}

@keyframes twinkle{

0%{opacity:.2;}

50%{opacity:1;}

100%{opacity:.2;}

}

.container{

width:90%;

max-width:600px;

text-align:center;

z-index:2;

animation:fade 2s;

}

@keyframes fade{

from{

opacity:0;

transform:translateY(40px);

}

to{

opacity:1;

transform:translateY(0);

}

}

h1{

font-size:38px;

margin-bottom:20px;

letter-spacing:3px;

}

h2{

font-weight:300;

margin-bottom:40px;

}

button{

padding:18px 45px;

border:none;

border-radius:40px;

background:white;

color:black;

font-size:18px;

cursor:pointer;

transition:.4s;

}

button:hover{

transform:scale(1.05);

}

#message{

display:none;

margin-top:40px;

font-size:20px;

line-height:1.8;

animation:fade 1s;

}

.small{

margin-top:25px;

font-size:14px;

opacity:.7;

}

</style>

</head>

<body>

<div class="stars"></div>

<div class="container">

<h1>TRANSMISSION</h1>

<h2>For Lea</h2>

<button onclick="openMessage()">

Open Transmission

</button>

<div id="message">

<p>

Hi, Lea.

</p>

<br>

<p>

If you're reading this,

today is July 17.

</p>

<br>

<p>

Happy Birthday. 🎂

</p>

<br>

<p>

I hope this year brings you

more happiness,

more laughter,

and beautiful memories.

</p>

<br>

<p>

Thank you for existing.

</p>

<p class="small">

— From someone in 2026

</p>

</div>

</div>

<script>

for(let i=0;i<150;i++){

let star=document.createElement("div");

star.className="star";

star.style.left=Math.random()*100+"%";

star.style.top=Math.random()*100+"%";

star.style.animationDelay=Math.random()*5+"s";

document.querySelector(".stars").appendChild(star);

}

function openMessage(){

document.querySelector("button").style.display="none";

document.getElementById("message").style.display="block";

}

</script>

</body>

</html>
